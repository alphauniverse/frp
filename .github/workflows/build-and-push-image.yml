name: Build Image and Publish to Dockerhub

on:
  schedule:
    - cron: '0 6 */5 * *'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag'
        required: true
        default: 'latest'

permissions:
  contents: read
  packages: write

jobs:
  image:
    name: Build Image from Dockerfile and binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: fatedier/frp
          ref: master
          fetch-depth: 1

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Check for New Release
        id: check_release
        run: |
          set -e
          latest_release=$(curl --retry 3 --connect-timeout 10 -s https://api.github.com/repos/fatedier/frp/releases/latest | jq -r .tag_name)

          if [ -z "$latest_release" ] || [ "$latest_release" == "null" ]; then
            echo "Error: Failed to fetch latest release."
            exit 1
          fi
          echo "Fetched latest release: $latest_release"
          echo "LATEST_RELEASE=${latest_release}" >> $GITHUB_ENV

      - name: Load Cached Release Version
        id: load_cached_version
        uses: actions/cache@v5
        with:
          path: ./release_version.txt
          key: release-version-${{ runner.os }}
          restore-keys: |
            release-version-${{ runner.os }}-

      - name: Compare Versions
        id: compare_version
        run: |
          CONTINUE="false"
          if [[ -f release_version.txt ]]; then
            cached_version=$(cat release_version.txt)
            echo "Cached release version: $cached_version"
            if [[ "$cached_version" != "${{ env.LATEST_RELEASE }}" ]]; then
              CONTINUE="true"
            else
              echo "No new release detected, skip build."
            fi
          else
            echo "No cached version found, proceed to build."
            CONTINUE="true"
          fi
          echo "continue=${CONTINUE}" >> $GITHUB_ENV
          echo "::set-output name=continue::${CONTINUE}"

      - name: Save New Release Version
        if: env.continue == 'true'
        run: |
          echo "${{ env.LATEST_RELEASE }}" > release_version.txt
          echo "Saved new release version: ${{ env.LATEST_RELEASE }}"

      - name: Setup Docker Environment
        if: env.continue == 'true'
        run: |
          echo "Setting up Docker Buildx and QEMU for multi-arch build"

      - name: Set up QEMU
        if: env.continue == 'true'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        if: env.continue == 'true'
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Login to DockerHub
        if: env.continue == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          logout: true

      - name: Prepare Image Tags
        if: env.continue == 'true'
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag_name="${{ github.event.inputs.tag }}"
          else
            tag_name="latest"
          fi
          echo "TAG_NAME=${tag_name}" >> $GITHUB_ENV
          echo "DOCKERHUB_USER=${{ secrets.DOCKERHUB_USERNAME }}" >> $GITHUB_ENV

      - name: Build and push images
        if: env.continue == 'true'
        run: |
          set -e
          for service in frpc frps; do
            echo "=== Building and pushing ${service} ==="
            tags=(
              "${{ env.DOCKERHUB_USER }}/${service}:${{ env.TAG_NAME }}"
              "${{ env.DOCKERHUB_USER }}/${service}:${{ env.LATEST_RELEASE }}"
            )
            tag_args=$(printf -- "--tag %s " "${tags[@]}")
            
            docker buildx build --platform linux/amd64,linux/arm64 \
              --file "dockerfiles/Dockerfile-for-${service}" \
              ${tag_args} \
              --push \
              --progress=plain .
            
            echo "Successfully pushed ${service} images: ${tags[*]}"
          done

      - name: Update Cache with New Version
        if: env.continue == 'true'
        uses: actions/cache/save@v5
        with:
          path: ./release_version.txt
          key: release-version-${{ runner.os }}
