name: Build Image and Publish to Dockerhub

on:
  schedule:
    - cron: '0 6 * * *'  # 每5天 UTC 6:00 检查新版本
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g., latest, v0.51.3)'
        required: true
        default: 'latest'

permissions:
  contents: read

jobs:
  image:
    name: Build Multi-Arch Docker Images
    runs-on: ubuntu-latest
    env:
      BUILD_PLATFORMS: linux/amd64,linux/arm64
    
    steps:
      - name: Install jq for JSON Parsing
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch Latest GitHub Release
        id: fetch_release
        run: |
          set -euo pipefail
          latest_release=$(curl --retry 3 --retry-delay 2 --connect-timeout 10 -s \
            https://api.github.com/repos/fatedier/frp/releases/latest | jq -r .tag_name)
          
          if [[ -z "$latest_release" || "$latest_release" == "null" ]]; then
            echo "❌ Failed to fetch latest release version"
            exit 1
          fi
          
          echo "✅ Latest release detected: $latest_release"
          echo "LATEST_RELEASE=$latest_release" >> $GITHUB_ENV

      - name: Restore Previous Release Version Cache
        id: cache_restore
        uses: actions/cache@v5
        with:
          path: release_version.txt
          key: release-version-${{ runner.os }}-${{ hashFiles('release_version.txt') || 'default' }}
          restore-keys: |
            release-version-${{ runner.os }}-
            release-version-

      - name: Determine Build Requirement
        id: version_check
        run: |
          set -euo pipefail
          CONTINUE="false"
          
          if [[ -f release_version.txt ]]; then
            cached_version=$(cat release_version.txt | tr -d '\r\n')
            echo "📦 Cached version: $cached_version"
            echo "🆕 Current release: ${{ env.LATEST_RELEASE }}"
            
            if [[ "$cached_version" != "${{ env.LATEST_RELEASE }}" ]]; then
              echo "✨ New version detected! Proceeding with build."
              CONTINUE="true"
            else
              echo "⏭️  No new release. Skipping build."
            fi
          else
            echo "🆕 No cached version found. Proceeding with initial build."
            CONTINUE="true"
          fi
          
          echo "continue=$CONTINUE" >> $GITHUB_ENV
          # 使用现代方式设置 step output（虽未直接使用，但保留结构清晰性）
          echo "continue=$CONTINUE" >> $GITHUB_OUTPUT

      - name: Checkout frp Repository
        if: env.continue == 'true'
        uses: actions/checkout@v6
        with:
          repository: fatedier/frp
          ref: ${{ env.LATEST_RELEASE }}
          fetch-depth: 1

      - name: Set Up QEMU for Multi-Arch
        if: env.continue == 'true'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ env.BUILD_PLATFORMS }}

      - name: Set Up Docker Buildx
        if: env.continue == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log In to Docker Hub
        if: env.continue == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Prepare Image Tags
        if: env.continue == 'true'
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="latest"
          fi
          
          echo "TAG_NAME=$TAG" >> $GITHUB_ENV
          echo "DOCKERHUB_USER=${{ secrets.DOCKERHUB_USERNAME }}" >> $GITHUB_ENV
          echo "🏷️  Building with tags: $TAG and ${{ env.LATEST_RELEASE }}"

      - name: Build and Push frpc
        if: env.continue == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ env.BUILD_PLATFORMS }}
          push: true
          tags: |
            ${{ env.DOCKERHUB_USER }}/frpc:${{ env.TAG_NAME }}
            ${{ env.DOCKERHUB_USER }}/frpc:${{ env.LATEST_RELEASE }}
          dockerfile: dockerfiles/Dockerfile-for-frpc

      - name: Build and Push frps
        if: env.continue == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ env.BUILD_PLATFORMS }}
          push: true
          tags: |
            ${{ env.DOCKERHUB_USER }}/frps:${{ env.TAG_NAME }}
            ${{ env.DOCKERHUB_USER }}/frps:${{ env.LATEST_RELEASE }}
          dockerfile: dockerfiles/Dockerfile-for-frps

      - name: Save Current Release Version
        if: env.continue == 'true'
        run: |
          echo -n "${{ env.LATEST_RELEASE }}" > release_version.txt
          echo "💾 Saved version to cache file: ${{ env.LATEST_RELEASE }}"

      - name: Save Release Version to Cache
        if: env.continue == 'true'
        uses: actions/cache/save@v5
        with:
          path: release_version.txt
          key: release-version-${{ runner.os }}-${{ hashFiles('release_version.txt') }}
